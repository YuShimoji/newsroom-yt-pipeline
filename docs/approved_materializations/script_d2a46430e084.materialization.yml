- index: 1
  segment_id: plan_20260603_faca8ebcbc45__intro__s0
  speaker: ナレーター
  approved_text: 企業AIの焦点は、モデルそのものから、業務の中で動くAIをどう運用するかに移っています。Microsoftは、エージェントを作り、動かし、管理し、改善する統合基盤を示しています。NISTは、その基盤を信頼できるものにするため、リスクを測る評価軸を提示しています。
  source_refs:
